<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – CreditReports.dk</title>
  <meta name="description" content="Create a free account and access credit risk reports for 300,000+ Danish companies. Currently in beta — unlimited free access.">
  <link rel="canonical" href="https://creditreports.dk/en/create-account/">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <meta http-equiv="refresh" content="3;url=https://platform.creditreports.dk/register">
</head>
<body>
<div id="site-nav"></div>
<main>
  <section style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:var(--section-py) var(--page-x);">
    <div style="max-width:480px;text-align:center;">
      <div class="badge badge--blue" style="margin-bottom:1.5rem;display:inline-flex;"><span class="badge-dot" aria-hidden="true"></span>Beta — free access</div>
      <h1 style="font-size:var(--text-2xl);font-weight:300;color:var(--charcoal);margin-bottom:1rem;line-height:1.2;">Create your free account</h1>
      <p style="font-size:var(--text-base);font-weight:300;color:var(--gray-steel);line-height:1.7;margin-bottom:0.75rem;">You are being redirected to the registration page at <strong>platform.creditreports.dk</strong>.</p>
      <p style="font-size:var(--text-sm);color:var(--gray-steel);margin-bottom:2rem;">During beta, you receive unlimited credit reports free of charge. No payment required.</p>
      <a href="https://platform.creditreports.dk/register" class="btn btn-primary btn-large" style="display:inline-flex;">
        Go to registration
        <span aria-hidden="true" style="margin-left:0.4em;">→</span>
      </a>
      <p style="margin-top:1.5rem;font-size:var(--text-sm);color:var(--gray-steel);">Already have an account? <a href="https://platform.creditreports.dk" style="color:var(--blue);">Login →</a></p>
    </div>
  </section>
</main>
<div id="site-footer"></div>
<script src="../../js/nav.js"></script>
<script src="../../js/main.js"></script>
</body>
</html>
